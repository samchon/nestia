# author: elliot-huffman
name: release
on:
  push:
    tags:
      - "*"
permissions:
  id-token: write
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org/
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/core/native/go.mod
          cache-dependency-path: packages/core/native/go.sum
      - name: Install dependencies
        run: pnpm install
      - name: Publish to npm
        run: pnpm run package:latest --no-git-checks --provenance
  release:
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - run: pnpm dlx changelogithub
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  website:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org/
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/core/native/go.mod
          cache-dependency-path: packages/core/native/go.sum
      - name: Build Packages
        run: pnpm install && pnpm run package:tgz
      - name: Website Setup
        working-directory: website
        run: |
          npm cache clean --force
          npm install
          npm run build
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@4.1.3
        with:
          branch: gh-pages
          folder: ./website/out